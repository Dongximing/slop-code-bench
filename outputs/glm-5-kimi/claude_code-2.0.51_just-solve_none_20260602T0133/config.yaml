agent:
  base_url: http://1.95.77.23:3000
  binary: claude
  cost_limits:
    cost_limit: 0
    net_cost_limit: 0
    step_limit: 100
  permission_mode: bypassPermissions
  type: claude_code
  version: 2.0.51
agent_config_path: /shared_workspace_mfs/ximing/slop-code-bench/configs/agents/claude_code_kimi.yaml
environment:
  commands:
    agent_command: python
    command: uv run
    entry_file: '{entry_file}.py'
  docker:
    image: ghcr.io/astral-sh/uv:python3.12-trixie-slim
    mount_workspace: true
    workdir: /workspace
  environment:
    env:
      PIP_CACHE_DIR: /tmp/pip-cache-dir
      PIP_CONFIG_FILE: /tmp/pip-conf
      UV_CACHE_DIR: /tmp/uv-cache
  name: python3.12
  setup:
    eval_commands:
    - uv init
    - uv add -r requirements.txt
    resume_commands:
    - python -m venv .venv || true
    - .venv/bin/pip install -r requirements.txt 2>/dev/null || true
  type: docker
environment_config_path: /shared_workspace_mfs/ximing/slop-code-bench/configs/environments/docker-python3.12-uv.yaml
model:
  name: glm-5-kimi
  provider: zhipu
one_shot:
  enabled: false
  include_first_prefix: false
  prefix: ''
output_path: outputs/glm-5-kimi/claude_code-2.0.51_just-solve_none_20260602T0133
pass_policy: any
post_checkpoint_skill:
  eval_after: true
  prompt: "Refactor ONLY the Python files in /workspace root (ls /workspace/*.py to\
    \ find them).\nDo NOT touch files under /workspace/files/, /workspace/tests/,\
    \ /workspace/venv/, or any subdirectories.\nDo NOT touch requirements.txt.\n\n\
    CRITICAL SAFETY RULES \u2014 violations will break tests:\n- NEVER delete a function,\
    \ method, or class that is called anywhere\n- NEVER merge two functions that have\
    \ different return values, exit codes, or output formats\n- NEVER change error\
    \ messages, exit codes, status codes, or output formats\n- NEVER add or remove\
    \ validation/checks \u2014 keep the exact same acceptance/rejection behavior\n\
    - NEVER change the order of operations if it could affect output ordering\n- When\
    \ in doubt, DO NOT change it\n\nAfter each edit, mentally verify: \"does this\
    \ produce identical output for every possible input?\"\n\nSAFE REFACTORS (apply\
    \ these):\n1. Delete comments that repeat what the code says\n2. Remove multi-line\
    \ docstrings that just restate the function name \u2014 replace with single-line\n\
    3. Move inline imports to top of file\n4. Simplify: range(len(x)) -> enumerate\n\
    5. Simplify: if cond: return True else: return False -> return cond\n6. Remove\
    \ unnecessary else/elif after return (but keep the logic identical)\n7. Remove\
    \ dead code that is truly unreachable (unused imports, unused variables)\n8. Remove\
    \ excessive blank lines\n9. Extract repeated code blocks into a helper function\
    \ (only if 3+ copies exist)\n10. Simplify expressions: e.g. x = foo(); x = bar(x)\
    \ -> x = bar(foo())\n\nUNSAFE \u2014 DO NOT DO THESE:\n- Merging two different\
    \ functions into one\n- Deleting a function and replacing calls with inline code\n\
    - Changing constants, exit codes, or error strings\n- Removing \"redundant\" checks\
    \ that might handle edge cases\n- Changing data structures (dict -> list, class\
    \ -> tuple, etc.)\n- Reordering function parameters or changing default values\n\
    - Adding new validation or type checking that wasn't there before\n\nBe conservative.\
    \ A missed cleanup opportunity is fine. A broken test is not.\n"
  run_on: all
problems:
- circuit_eval
prompt_content: 'Implement a program that 100% solves the specification. That is all
  you need to do.

  {% if not is_continuation -%}

  Use a virtual environment and ensure that a `requirements.txt` is present with any
  dependencies you need to solve the problem.

  {% else -%}

  Keep using the same virtual environment you started with, update `requirements.txt`
  with any new dependencies you need.

  {% endif -%}


  Your task is:

  {{ spec.strip() }}

  '
prompt_path: /shared_workspace_mfs/ximing/slop-code-bench/configs/prompts/just-solve.jinja
save_dir: outputs
save_template: glm-5-kimi/claude_code-2.0.51_just-solve_none_20260602T0133
thinking: none
thinking_max_tokens: null
