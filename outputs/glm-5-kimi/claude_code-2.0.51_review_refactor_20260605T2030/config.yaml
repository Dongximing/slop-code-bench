agent:
  base_url: http://1.95.77.23:3000
  binary: claude
  cost_limits:
    cost_limit: 0
    net_cost_limit: 0
    step_limit: 100
  permission_mode: bypassPermissions
  type: claude_code
  version: 2.0.51
agent_config_path: /shared_workspace_mfs/ximing/slop-code-bench/configs/agents/claude_code_kimi.yaml
environment:
  commands:
    agent_command: python
    command: uv run
    entry_file: '{entry_file}.py'
  docker:
    image: ghcr.io/astral-sh/uv:python3.12-trixie-slim
    mount_workspace: true
    workdir: /workspace
  environment:
    env:
      PIP_CACHE_DIR: /tmp/pip-cache-dir
      PIP_CONFIG_FILE: /tmp/pip-conf
      UV_CACHE_DIR: /tmp/uv-cache
  name: python3.12
  setup:
    eval_commands:
    - uv init
    - uv add -r requirements.txt
    resume_commands:
    - python -m venv .venv || true
    - .venv/bin/pip install -r requirements.txt 2>/dev/null || true
  type: docker
environment_config_path: /shared_workspace_mfs/ximing/slop-code-bench/configs/environments/docker-python3.12-uv.yaml
model:
  name: glm-5-kimi
  provider: zhipu
one_shot:
  enabled: false
  include_first_prefix: false
  prefix: ''
output_path: outputs/glm-5-kimi/claude_code-2.0.51_review_refactor_20260605T2030
pass_policy: any
post_checkpoint_skill:
  eval_after: true
  prompt: "You will improve the code quality of the solution files in /workspace root.\n\
    Do NOT touch files under /workspace/files/, /workspace/tests/, /workspace/venv/,\
    \ or any subdirectories.\nDo NOT touch requirements.txt.\n\nFollow these 3 phases\
    \ IN ORDER. Do not skip any phase.\n\nPHASE 1: AUDIT\nRun `ls /workspace/*.py`\
    \ to identify solution files.\nRead each file end-to-end. For each file, produce\
    \ a numbered list of findings.\nCategories (priority order):\nA. DEAD CODE - Unused\
    \ imports, variables, unreachable branches, uncalled functions\nB. COMMENT SLOP\
    \ - Restating comments, verbose docstrings, commented-out code\nC. STYLE - range(len(x))\u2192\
    enumerate, if/else return\u2192return cond, elif after return, bare except\nD.\
    \ DUPLICATION - 3+ identical blocks, copy-pasted logic\nE. STRUCTURAL (review\
    \ only, very cautious) - Long condition chains, 80+ line functions\n\nPHASE 2:\
    \ SAFETY CHECK\nFor EACH finding: \"Can this change produce different output for\
    \ ANY input?\"\nDROP if: merging functions, removing checks, changing error messages/exit\
    \ codes/output format,\nchanging operation order, changing defaults/signatures,\
    \ changing data structures, not 100% certain, category E not trivially safe.\n\
    \nPHASE 3: APPLY\nApply ONLY APPROVED changes. One edit at a time. Re-read after.\
    \ Revert if wrong. Max 30 edits per file.\nA missed cleanup is acceptable. A broken\
    \ test is not.\n"
  run_on: all
problems:
- code_search
- database_migration
- datagate
- env_manager
- etl_pipeline
- eve_industry
- eve_jump_planner
- eve_route_planner
prompt_content: 'Implement a program that 100% solves the specification. That is all
  you need to do.

  {% if not is_continuation -%}

  Use a virtual environment and ensure that a `requirements.txt` is present with any
  dependencies you need to solve the problem.

  {% else -%}

  Keep using the same virtual environment you started with, update `requirements.txt`
  with any new dependencies you need.

  {% endif -%}


  Your task is:

  {{ spec.strip() }}

  '
prompt_path: /shared_workspace_mfs/ximing/slop-code-bench/configs/prompts/just-solve.jinja
save_dir: outputs
save_template: glm-5-kimi/claude_code-2.0.51_review_refactor_20260605T2030
thinking: none
thinking_max_tokens: null
