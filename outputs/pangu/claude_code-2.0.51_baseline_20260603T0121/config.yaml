agent:
  base_url: http://127.0.0.1:8088/v2/infer/2f3b4115-6ed0-40ea-acee-e245a8182f08
  binary: claude
  cost_limits:
    cost_limit: 0
    net_cost_limit: 0
    step_limit: 100
  permission_mode: bypassPermissions
  type: claude_code
  version: 2.0.51
agent_config_path: /shared_workspace_mfs/ximing/slop-code-bench/configs/agents/claude_code_pangu_new.yaml
environment:
  commands:
    agent_command: python
    command: uv run
    entry_file: '{entry_file}.py'
  docker:
    image: ghcr.io/astral-sh/uv:python3.12-trixie-slim
    mount_workspace: true
    network: host
    workdir: /workspace
  environment:
    env:
      PIP_CACHE_DIR: /tmp/pip-cache-dir
      PIP_CONFIG_FILE: /tmp/pip-conf
      UV_CACHE_DIR: /tmp/uv-cache
  name: python3.12
  setup:
    eval_commands:
    - uv init
    - uv add -r requirements.txt
    resume_commands:
    - python -m venv .venv || true
    - .venv/bin/pip install -r requirements.txt 2>/dev/null || true
  type: docker
environment_config_path: /shared_workspace_mfs/ximing/slop-code-bench/configs/environments/docker-python3.12-uv-host.yaml
model:
  name: pangu
  provider: pangu
one_shot:
  enabled: false
  include_first_prefix: false
  prefix: ''
output_path: outputs/pangu/claude_code-2.0.51_just-solve_none_20260603T0121
pass_policy: any
post_checkpoint_skill: null
problems:
- cfgpipe
- code_search
- dag_execution
- etl_pipeline
- eve_industry
- eve_jump_planner
prompt_content: 'Implement a program that 100% solves the specification. That is all
  you need to do.

  {% if not is_continuation -%}

  Use a virtual environment and ensure that a `requirements.txt` is present with any
  dependencies you need to solve the problem.

  {% else -%}

  Keep using the same virtual environment you started with, update `requirements.txt`
  with any new dependencies you need.

  {% endif -%}


  Your task is:

  {{ spec.strip() }}

  '
prompt_path: /shared_workspace_mfs/ximing/slop-code-bench/configs/prompts/just-solve.jinja
save_dir: outputs
save_template: pangu/claude_code-2.0.51_just-solve_none_20260603T0121
thinking: none
thinking_max_tokens: null
