post_checkpoint_skill:
  eval_after: true
  prompt: "You will improve the code quality of the solution files in /workspace root.\n\
    Do NOT touch files under /workspace/files/, /workspace/tests/, /workspace/venv/,\
    \ or any subdirectories.\nDo NOT touch requirements.txt.\n\nFollow these 3 phases\
    \ IN ORDER. Do not skip any phase.\n\nPHASE 1: AUDIT\nRun `ls /workspace/*.py`\
    \ to identify solution files.\nRead each file end-to-end. For each file, produce\
    \ a numbered list of findings.\nCategories (priority order):\nA. DEAD CODE - Unused\
    \ imports, variables, unreachable branches, uncalled functions\nB. COMMENT SLOP\
    \ - Restating comments, verbose docstrings, commented-out code\nC. STYLE - range(len(x))\u2192\
    enumerate, if/else return\u2192return cond, elif after return, bare except\nD.\
    \ DUPLICATION - 3+ identical blocks, copy-pasted logic\nE. STRUCTURAL (review\
    \ only, very cautious) - Long condition chains, 80+ line functions\n\nPHASE 2:\
    \ SAFETY CHECK\nFor EACH finding: \"Can this change produce different output for\
    \ ANY input?\"\nDROP if: merging functions, removing checks, changing error messages/exit\
    \ codes/output format,\nchanging operation order, changing defaults/signatures,\
    \ changing data structures, not 100% certain, category E not trivially safe.\n\
    \nPHASE 3: APPLY\nApply ONLY APPROVED changes. One edit at a time. Re-read after.\
    \ Revert if wrong. Max 30 edits per file.\nA missed cleanup is acceptable. A broken\
    \ test is not.\n"
  run_on: all
