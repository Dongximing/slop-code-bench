post_checkpoint_skill:
  eval_after: true
  prompt: "Perform a deep code quality audit on ONLY the Python files you created\
    \ in /workspace root.\nDo NOT touch files under /workspace/files/, /workspace/tests/,\
    \ /workspace/venv/, or any test data directories.\nDo NOT touch requirements.txt.\n\
    \nRethink how to structure the implementation to meaningfully improve code quality\
    \ without impacting behavior.\nBe ambitious \u2014 actively search for restructurings\
    \ that preserve behavior while making the code dramatically simpler, smaller,\
    \ and more direct.\n\nApply these rules and directly edit the code to fix any\
    \ violations:\n\n1. STRUCTURAL SIMPLIFICATION\n   - Delete whole layers of unnecessary\
    \ indirection, wrappers, or pass-through helpers\n   - Reframe state models so\
    \ conditionals disappear rather than getting centralized\n   - Collapse duplicate\
    \ branches into a single clearer flow\n   - Replace condition chains with a typed\
    \ model or explicit dispatcher\n   - If independent work is serialized for no\
    \ reason, restructure it\n\n2. SPAGHETTI PREVENTION\n   - Remove ad-hoc conditionals\
    \ and scattered special cases inserted into unrelated flows\n   - Push one-off\
    \ logic into dedicated helpers or separate functions\n   - Extract narrow edge-case\
    \ handling out of busy functions into their own functions\n   - Remove one-off\
    \ booleans or flags that complicate existing control flow\n\n3. ABSTRACTION QUALITY\n\
    \   - Delete thin wrappers or identity abstractions that add indirection without\
    \ simplifying anything\n   - Remove unnecessary casts, Any types, or optional\
    \ params that muddy the real contract\n   - Replace copy-pasted logic with extracted\
    \ helpers\n   - Reuse existing utilities instead of bespoke near-duplicates\n\n\
    4. SLOP REMOVAL\n   - Delete comments that repeat what the code already says\n\
    \   - Remove multi-line docstrings that just restate the function name\n   - Move\
    \ inline imports to top of file\n   - Simplify: range(len(x)) -> enumerate, if\
    \ cond: return True else: return False -> return cond\n   - Remove unnecessary\
    \ else/elif after return\n   - Remove dead code, unused imports, unused variables\n\
    \   - Remove excessive blank lines\n\n5. FILE ORGANIZATION\n   - If a file exceeds\
    \ ~500 lines, split into focused modules\n   - Separate orchestration from business\
    \ logic\n   - Move feature-specific logic behind dedicated abstractions\n\nPriority:\
    \ structural simplifications (1-3) over cosmetic cleanup (4).\nDo NOT change any\
    \ behavior. All existing functionality must be preserved.\n"
  run_on: all
